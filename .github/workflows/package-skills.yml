name: Package skill artifact

on:
  workflow_dispatch:
  push:
    tags:
      - "skills-v*"

permissions:
  contents: write

jobs:
  package-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run skill tests
        run: python -m pytest -q

      - name: Build skill-only release artifact
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            python scripts/build_skill_release.py --tag "${GITHUB_REF_NAME}"
          else
            python scripts/build_skill_release.py
          fi

      - name: Validate release artifact rules
        run: python -m pytest skills/tests/test_distribution_package.py -q

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: study-os-thesis-skills
          path: |
            dist/study-os-thesis-skills-v*.tar.gz
            dist/study-os-thesis-skills-v*.zip

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/study-os-thesis-skills-v*.tar.gz
            dist/study-os-thesis-skills-v*.zip
