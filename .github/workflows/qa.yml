name: Code Quality

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**/*.py'
      - 'backend/pyproject.toml'
      - 'backend/uv.lock'
      - 'skills/**'
      - 'pytest.ini'
      - '.github/workflows/qa.yml'

jobs:
  backend-lint:
    name: Backend lint (Ruff)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'backend/uv.lock'

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  backend-test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    # The test suite mocks all I/O, but these values satisfy required settings
    # at import time.
    env:
      DATABASE_URL: 'postgresql+asyncpg://ci:ci@127.0.0.1:5432/ci'
      JWT_SECRET: 'ci-placeholder-secret-not-for-production-1234567890'
      REDIS_URL: 'redis://127.0.0.1:6379/0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'backend/uv.lock'

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest --maxfail=1 --disable-warnings -q

  backend-audit:
    name: Backend dependency audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'backend/uv.lock'

      - name: Install dependencies
        run: uv sync --group audit

      - name: Audit Python dependencies
        run: uv run --group audit pip-audit --local --progress-spinner off

  skill-test:
    name: Skill package tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Run skill tests
        run: python -m pytest -q
