name: LLM Evals

on:
  workflow_dispatch:

jobs:
  deepeval:
    name: DeepEval skill quality
    runs-on: ubuntu-latest

    env:
      RUN_DEEPEVAL: '1'
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPEVAL_TELEMETRY_OPT_OUT: 'YES'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: python -m pip install pytest deepeval

      - name: Run DeepEval tests
        run: python -m pytest skills/tests/evals -m eval -q
