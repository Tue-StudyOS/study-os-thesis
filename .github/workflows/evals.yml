name: LLM Evals

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  deepeval:
    name: DeepEval proposal quality
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: 'postgresql+asyncpg://ci:ci@127.0.0.1:5432/ci'
      JWT_SECRET: 'ci-placeholder-secret-not-for-production-1234567890'
      REDIS_URL: 'redis://127.0.0.1:6379/0'
      RUN_DEEPEVAL: '1'
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPEVAL_TELEMETRY_OPT_OUT: 'YES'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'backend/uv.lock'

      - name: Install dependencies
        run: uv sync --group eval

      - name: Run DeepEval tests
        run: uv run pytest tests/evals -m eval -q -p no:rerunfailures
