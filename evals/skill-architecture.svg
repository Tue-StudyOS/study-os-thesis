<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="450" viewBox="0 0 1000 450">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <style>
      .title { font-size: 18px; font-weight: 600; fill: #111827; }
      .subtitle { font-size: 12px; font-weight: 400; fill: #6B7280; }
      .stage-label { font-size: 10px; font-weight: 700; fill: #9CA3AF; letter-spacing: 0.5px; }
      .skill-name { font-size: 12px; font-weight: 600; fill: #111827; }
      .badge { font-size: 8px; font-weight: 600; fill: #065F46; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="450" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title">Skill Architecture — Student Thesis Discovery Journey</text>
  <text x="500" y="48" text-anchor="middle" class="subtitle">Skill invocation graph • live web search • no database required</text>

  <!-- Stage labels -->
  <text x="100" y="75" text-anchor="middle" class="stage-label">① PROFILE</text>
  <text x="270" y="75" text-anchor="middle" class="stage-label">② ROUTE</text>
  <text x="500" y="75" text-anchor="middle" class="stage-label">③ DISCOVER</text>
  <text x="750" y="75" text-anchor="middle" class="stage-label">④ CONTACT</text>

  <!-- SKILL BOXES -->

  <!-- Stage 1: build-student-profile -->
  <rect x="30" y="100" width="140" height="65" fill="#EFF6FF" rx="8" stroke="#3B82F6" stroke-width="2"/>
  <text x="100" y="125" text-anchor="middle" class="skill-name">build-student-</text>
  <text x="100" y="142" text-anchor="middle" class="skill-name">profile</text>

  <!-- Stage 2: thesis-finder (router) -->
  <rect x="205" y="100" width="130" height="65" fill="#F5F3FF" rx="8" stroke="#8B5CF6" stroke-width="2"/>
  <text x="270" y="130" text-anchor="middle" class="skill-name">thesis-</text>
  <text x="270" y="147" text-anchor="middle" class="skill-name">finder</text>

  <!-- Arrows -->
  <path d="M 170 132 L 205 132" stroke="#9CA3AF" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Stage 3a: find-university-chairs (top) -->
  <rect x="380" y="85" width="170" height="65" fill="#F0FDF4" rx="8" stroke="#10B981" stroke-width="2"/>
  <text x="465" y="112" text-anchor="middle" class="skill-name">find-university-</text>
  <text x="465" y="129" text-anchor="middle" class="skill-name">chairs</text>

  <!-- Badge: live web -->
  <rect x="415" y="138" width="100" height="16" fill="#D1FAE5" rx="8" stroke="#6EE7B7" stroke-width="1"/>
  <text x="465" y="147" text-anchor="middle" class="badge">⚡ live web</text>

  <!-- Stage 3b: find-company-thesis-options (bottom) -->
  <rect x="380" y="210" width="170" height="65" fill="#F0FDF4" rx="8" stroke="#10B981" stroke-width="2"/>
  <text x="465" y="237" text-anchor="middle" class="skill-name">find-company-</text>
  <text x="465" y="254" text-anchor="middle" class="skill-name">thesis-options</text>

  <!-- Badge: live web -->
  <rect x="415" y="263" width="100" height="16" fill="#D1FAE5" rx="8" stroke="#6EE7B7" stroke-width="1"/>
  <text x="465" y="272" text-anchor="middle" class="badge">⚡ live web</text>

  <!-- Arrows from finder to discovery -->
  <path d="M 335 118 Q 360 110 380 117" stroke="#9CA3AF" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 335 145 Q 360 180 380 243" stroke="#9CA3AF" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Stage 4: draft-thesis-contact -->
  <rect x="695" y="155" width="150" height="65" fill="#FFF7ED" rx="8" stroke="#F59E0B" stroke-width="2"/>
  <text x="770" y="182" text-anchor="middle" class="skill-name">draft-thesis-</text>
  <text x="770" y="199" text-anchor="middle" class="skill-name">contact</text>

  <!-- Arrows to contact -->
  <path d="M 550 117 Q 620 140 695 177" stroke="#9CA3AF" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 550 243 Q 620 220 695 188" stroke="#9CA3AF" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Reference files section -->
  <line x1="30" y1="290" x2="850" y2="290" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="30" y="315" font-size="11" font-weight="600" fill="#111827">Reference Files & Data Sources</text>

  <!-- References boxes -->
  <rect x="30" y="330" width="145" height="20" fill="#EFF6FF" rx="6" stroke="#BFDBFE" stroke-width="1"/>
  <text x="102" y="343" text-anchor="middle" font-size="9" fill="#1D4ED8" font-weight="500">profile-schema.md</text>

  <rect x="190" y="330" width="165" height="20" fill="#EFF6FF" rx="6" stroke="#BFDBFE" stroke-width="1"/>
  <text x="272" y="343" text-anchor="middle" font-size="9" fill="#1D4ED8" font-weight="500">faculty-backbone.md</text>

  <rect x="370" y="330" width="155" height="20" fill="#EFF6FF" rx="6" stroke="#BFDBFE" stroke-width="1"/>
  <text x="447" y="343" text-anchor="middle" font-size="9" fill="#1D4ED8" font-weight="500">search-strategy.md</text>

  <rect x="30" y="365" width="175" height="20" fill="#EFF6FF" rx="6" stroke="#BFDBFE" stroke-width="1"/>
  <text x="117" y="378" text-anchor="middle" font-size="9" fill="#1D4ED8" font-weight="500">bw-company-backbone.md</text>

  <rect x="220" y="365" width="195" height="20" fill="#EFF6FF" rx="6" stroke="#BFDBFE" stroke-width="1"/>
  <text x="317" y="378" text-anchor="middle" font-size="9" fill="#1D4ED8" font-weight="500">company-search-strategy.md</text>

  <!-- Key insight -->
  <text x="30" y="415" font-size="10" fill="#9CA3AF">All data sourced at runtime via live web search • no cached databases • always current</text>
</svg>
